services:
  db:
    image: postgres:17-alpine
    container_name: belediye_atik_db
    environment:
      POSTGRES_DB: belediye_atik
      POSTGRES_USER: belediye_atik
      POSTGRES_PASSWORD: belediye_atik_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U belediye_atik -d belediye_atik"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

